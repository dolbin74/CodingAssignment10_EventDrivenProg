<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="David Anna">
  <meta name="description" content="CA10 - Event Driven Loot System">
  <title>Loot System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Loot System</h1>

<div class="container">

  <!-- Form -->
  <div class="form-box">
    <label for="lootName">Loot Name:</label>
    <input type="text" id="lootName">

    <label for="lootValue">Loot Value:</label>
    <input type="number" id="lootValue">

    <button id="addLootBtn">Add Loot</button>

    <p id="message" class="message"></p>
  </div>

  <!-- Display -->
  <div class="display-box">
    <h2>Loot List</h2>
    <ul id="lootList"></ul>

    <h2>Total Value</h2>
    <p id="totalValue">$0</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
